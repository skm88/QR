<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Nūr al-Qur'ān — Apprendre et mémoriser les 114 sourates du Coran avec phonétique, arabe et traduction française" />
  <title>Nūr al-Qur'ān — Apprendre le Coran</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕌</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c1117; --card: #151d27; --card-hover: #1a2535;
      --gold: #d4a24e; --gold-light: #f0d899; --gold-dim: rgba(212,162,78,.15);
      --green: #2ecc71; --green-dim: rgba(46,204,113,.15);
      --red: #e74c3c; --red-dim: rgba(231,76,60,.12);
      --blue: #3498db; --blue-dim: rgba(52,152,219,.15);
      --text: #e8e0d4; --text-dim: #8a8378; --text-muted: #5a5550;
      --border: rgba(212,162,78,.12); --radius: 14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
    #app{max-width:720px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,24px)}
    button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
    input,select{font-family:inherit}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(212,162,78,.2);border-radius:3px}

    .header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--card) 60%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 16px 16px;border-bottom:1px solid var(--border)}
    .header-inner{display:flex;align-items:center;gap:10px}
    .back-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);transition:background .15s;flex-shrink:0}
    .back-btn:hover{background:var(--gold-dim)}.back-btn.hidden{visibility:hidden;width:0;padding:0;overflow:hidden}
    .header-title{flex:1;text-align:center}
    .bismillah{font-family:'Amiri',serif;font-size:1.7rem;color:var(--gold);line-height:1.2}
    .app-title{font-size:1.05rem;font-weight:700;letter-spacing:.04em;margin-top:2px}
    .app-subtitle{font-size:.7rem;color:var(--text-dim);letter-spacing:.02em;margin-top:1px}

    .content{padding:16px;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .stats-card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border);margin-bottom:20px}
    .stats-grid{display:flex;align-items:center;justify-content:space-around;margin-bottom:14px}
    .stat-item{display:flex;flex-direction:column;align-items:center;gap:3px}
    .stat-num{font-size:1.4rem;font-weight:700;color:var(--gold)}
    .stat-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;text-align:center}
    .stat-divider{width:1px;height:30px;background:var(--border)}
    .progress-bar{height:5px;border-radius:3px;background:var(--gold-dim);overflow:hidden}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .5s ease}

    .search-row{display:flex;gap:8px;margin-bottom:14px}
    .search-input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.85rem;outline:none;transition:border-color .15s}
    .search-input:focus{border-color:var(--gold)}.search-input::placeholder{color:var(--text-muted)}
    .filter-select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:.78rem;outline:none;min-width:90px;-webkit-appearance:none;appearance:none;cursor:pointer}
    .filter-select:focus{border-color:var(--gold)}

    .section-title{font-size:.75rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .surah-list{display:flex;flex-direction:column;gap:6px}
    .surah-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:11px;border:1px solid var(--border);text-align:left;transition:all .12s;position:relative}
    .surah-card:hover{background:var(--card-hover);transform:translateY(-1px)}.surah-card:active{transform:scale(.985)}
    .surah-num-circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--gold-dim);flex-shrink:0}
    .surah-num-text{font-size:.8rem;font-weight:600;color:var(--gold)}
    .surah-info{flex:1;min-width:0;overflow:hidden}
    .surah-name-row{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
    .surah-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .surah-ar{font-family:'Amiri',serif;font-size:1.05rem;color:var(--gold);flex-shrink:0}
    .surah-meaning{font-size:.7rem;color:var(--text-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .surah-meta{display:flex;align-items:center;gap:6px;margin-top:4px}
    .mini-bar{flex:1;height:3px;border-radius:2px;background:var(--gold-dim);overflow:hidden}
    .mini-fill{height:100%;border-radius:2px;transition:width .4s ease}
    .mini-fill.gold{background:var(--gold)}.mini-fill.green{background:var(--green)}
    .surah-meta-text{font-size:.65rem;color:var(--text-muted);flex-shrink:0}
    .complete-badge{position:absolute;top:6px;right:10px;font-size:.68rem;color:var(--green);font-weight:700;background:var(--green-dim);border-radius:6px;padding:1px 7px}

    .surah-header{text-align:center;padding:24px 16px;margin-bottom:6px;background:linear-gradient(135deg,var(--gold-dim),transparent);border-radius:var(--radius);border:1px solid var(--border)}
    .surah-header-ar{font-family:'Amiri',serif;font-size:2.2rem;color:var(--gold)}
    .surah-header-name{font-size:1.15rem;font-weight:700;margin-top:4px}
    .surah-header-meaning{font-size:.78rem;color:var(--text-dim);margin-top:3px}
    .reciter-row{display:flex;align-items:center;gap:8px;margin-top:10px;justify-content:center}
    .reciter-label{font-size:.72rem;color:var(--text-muted)}
    .reciter-select{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:.75rem}

    .mode-tabs{display:flex;gap:5px;margin:14px 0 10px}
    .mode-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 4px;border-radius:9px;border:1px solid var(--border);color:var(--text-dim);font-size:.75rem;font-weight:500;transition:all .12s}
    .mode-tab:hover{border-color:var(--gold);color:var(--gold)}
    .mode-tab.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);font-weight:600}

    .toggle-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
    .toggle-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:18px;border:1px solid var(--border);color:var(--text-muted);font-size:.72rem;font-weight:500;transition:all .12s}
    .toggle-btn.active{border-color:rgba(212,162,78,.35);background:var(--gold-dim);color:var(--gold)}

    .verses-list{display:flex;flex-direction:column;gap:10px}
    .verse-card{padding:18px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);position:relative;transition:all .2s}
    .verse-card.memorized{border-color:rgba(46,204,113,.2);background:linear-gradient(135deg,var(--green-dim),var(--card))}
    .verse-card.hidden-verse{background:linear-gradient(135deg,var(--gold-dim),var(--card));border-style:dashed;cursor:pointer}
    .verse-card.hidden-verse:hover{background:rgba(212,162,78,.1)}
    .verse-num{position:absolute;top:10px;right:12px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;background:var(--gold-dim);color:var(--gold);font-weight:600}
    .arabic-text{font-family:'Amiri',serif;font-size:1.5rem;line-height:2.1;color:var(--text);text-align:right;direction:rtl;margin-bottom:10px;padding-right:34px;word-spacing:4px}
    .phonetic-text{font-size:.9rem;color:var(--gold);font-style:italic;line-height:1.6;margin-bottom:6px}
    .french-text{font-size:.85rem;color:var(--text-dim);line-height:1.55;margin-bottom:10px}

    .verse-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .audio-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1px solid var(--border);color:var(--text-muted);font-size:.75rem;transition:all .12s}
    .audio-btn:hover,.audio-btn.playing{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
    .mark-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:.75rem;font-weight:500;border:1px solid var(--border);color:var(--text-dim);transition:all .12s}
    .mark-btn:hover{border-color:var(--gold);color:var(--gold)}
    .mark-btn.done{border-color:rgba(46,204,113,.35);background:var(--green-dim);color:var(--green);font-weight:600}

    /* ── Marque-pages ── */
    .bk-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:7px;border:1px solid var(--border);color:var(--text-muted);transition:all .12s;flex-shrink:0}
    .bk-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
    .bk-btn.on{border-color:rgba(212,162,78,.5);background:var(--gold-dim);color:var(--gold)}
    .cat-btn{display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 10px;border-radius:7px;font-size:.78rem;font-weight:600;border:1px solid transparent;transition:all .12s;flex-shrink:0}

    .bookmark-dot{position:absolute;top:10px;left:12px;width:8px;height:8px;border-radius:50%}
    .verse-card.bookmarked{border-color:rgba(212,162,78,.3);box-shadow:0 0 0 1px rgba(212,162,78,.08)}

    .bm-panel-btn{display:flex;align-items:center;gap:9px;padding:12px 16px;border-radius:11px;border:1px solid rgba(212,162,78,.25);background:linear-gradient(135deg,var(--gold-dim),transparent);color:var(--gold);font-size:.82rem;font-weight:600;width:100%;margin-bottom:16px;transition:all .15s}
    .bm-panel-btn:hover{border-color:var(--gold);background:var(--gold-dim)}
    .bm-panel-btn .bm-badge{margin-left:auto;background:var(--gold);color:#0c1117;font-size:.68rem;font-weight:800;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center}

    .bm-back-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:.8rem;font-weight:500;width:100%;margin-bottom:18px;transition:all .12s}
    .bm-back-btn:hover{border-color:var(--gold);color:var(--gold)}
    .bm-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .bm-cat-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:18px;border:1px solid var(--border);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .12s;background:transparent}
    .bm-cat-tag:hover{transform:translateY(-1px)}
    .bm-cat-tag.active{box-shadow:0 0 0 2px currentColor}
    .bm-group{margin-bottom:22px}
    .bm-group-title{font-size:.72rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .bm-group-title span{color:var(--gold)}
    .bm-list{display:flex;flex-direction:column;gap:8px}
    .bm-card{padding:14px 16px;background:var(--card);border-radius:11px;border:1px solid rgba(212,162,78,.18)}
    .bm-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .bm-vtag{font-size:.7rem;font-weight:700;color:var(--gold);background:var(--gold-dim);padding:2px 9px;border-radius:8px}
    .bm-cat-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:8px;font-size:.66rem;font-weight:700;margin-left:auto}
    .bm-card-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .bm-open{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:7px;border:1px solid var(--border);color:var(--text-dim);font-size:.72rem;transition:all .12s}
    .bm-open:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
    .bm-rm{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:7px;border:1px solid rgba(231,76,60,.25);color:var(--red);font-size:.72rem;transition:all .12s}
    .bm-rm:hover{background:var(--red-dim)}
    .bm-empty{text-align:center;padding:52px 24px;color:var(--text-muted)}
    .bm-empty-ico{font-size:2.8rem;margin-bottom:14px}
    .bm-empty-txt{font-size:.86rem;line-height:1.6}

    /* ── Modale catégorie ── */
    .cat-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .cat-modal{background:var(--card);border-radius:18px 18px 0 0;padding:24px 16px calc(24px + env(safe-area-inset-bottom,0px));width:100%;max-width:720px;border-top:1px solid var(--border);animation:slideUp .2s ease}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    .cat-modal-title{font-size:.88rem;font-weight:700;color:var(--gold);margin-bottom:4px;text-align:center}
    .cat-modal-sub{font-size:.72rem;color:var(--text-muted);text-align:center;margin-bottom:18px}
    .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .cat-choice{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:10px;border:1px solid var(--border);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .12s;background:var(--bg);color:var(--text);width:100%;text-align:left}
    .cat-choice:hover{border-color:var(--gold)}
    .cat-choice.selected{font-weight:700}
    .cat-ico{font-size:1.1rem;flex-shrink:0}
    .cat-modal-cancel{width:100%;padding:10px;border-radius:9px;border:1px solid var(--border);color:var(--text-muted);font-size:.82rem;margin-top:4px;transition:all .12s}
    .cat-modal-cancel:hover{border-color:var(--red);color:var(--red)}

    .tap-reveal{display:flex;align-items:center;justify-content:center;gap:10px;padding:28px 0;color:var(--text-muted);font-size:.85rem}
    .mode-hint{font-size:.8rem;color:var(--text-dim);text-align:center;padding:10px 14px;background:var(--gold-dim);border-radius:9px;margin-bottom:10px;line-height:1.5}

    .quiz-card{background:var(--card);border-radius:var(--radius);padding:22px 18px;border:1px solid var(--border)}
    .quiz-label{font-size:.88rem;font-weight:600;color:var(--gold);margin-bottom:14px}
    .quiz-hint{font-size:.76rem;color:var(--text-muted);text-align:center;margin:14px 0 10px}
    .quiz-actions{text-align:center;margin-top:18px}
    .answer-box{padding:14px;background:var(--gold-dim);border-radius:11px;border:1px solid rgba(212,162,78,.2)}
    .quiz-btn-row{display:flex;gap:8px;margin-top:8px}
    .wrong-btn,.correct-btn{flex:1;padding:11px;border-radius:9px;font-size:.88rem;font-weight:600}
    .wrong-btn{border:1px solid rgba(231,76,60,.35);background:var(--red-dim);color:var(--red)}
    .correct-btn{border:1px solid rgba(46,204,113,.35);background:var(--green-dim);color:var(--green)}
    .wrong-btn:active,.correct-btn:active{transform:scale(.96)}
    .primary-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:9px;background:linear-gradient(135deg,var(--gold),#b8882e);color:#0c1117;font-size:.88rem;font-weight:700;letter-spacing:.02em;border:none;transition:transform .1s}
    .primary-btn:active{transform:scale(.96)}

    .quiz-result{text-align:center;padding:28px 14px}
    .quiz-score-circle{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--gold-dim);border:3px solid var(--gold);margin:0 auto 18px}
    .quiz-score-num{font-size:1.5rem;font-weight:700;color:var(--gold)}
    .quiz-result-title{font-size:1.05rem;margin-bottom:6px}
    .quiz-result-sub{font-size:.82rem;color:var(--text-dim);margin-bottom:22px}

    .reset-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;border:1px solid rgba(231,76,60,.3);background:var(--red-dim);color:var(--red);font-size:.78rem;font-weight:500;margin:28px auto 0}

    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-text{font-size:.85rem;color:var(--text-dim);animation:pulse 1.5s ease infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

    .empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:.88rem}

    .pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px;flex-wrap:wrap}
    .page-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);color:var(--text-dim);font-size:.76rem;font-weight:500;transition:all .12s}
    .page-btn:hover{border-color:var(--gold);color:var(--gold)}
    .page-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);font-weight:600}
    .page-btn:disabled{opacity:.3;cursor:default}

    .play-all-row{display:flex;justify-content:center;margin-bottom:12px}
    .play-all-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;border:1px solid var(--border);color:var(--text-dim);font-size:.78rem;font-weight:500;transition:all .12s}
    .play-all-btn:hover,.play-all-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}

    @media(max-width:400px){.arabic-text{font-size:1.25rem}.surah-header-ar{font-size:1.8rem}.mode-tab{font-size:.7rem;padding:8px 3px}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  const API="https://api.alquran.cloud/v1";
  const RECITERS=[
    {id:"ar.alafasy",name:"Mishary Alafasy"},
    {id:"ar.abdurrahmaansudais",name:"As-Sudais"},
    {id:"ar.abdulsamad",name:"Abdul Samad"},
    {id:"ar.husary",name:"Al-Husary"},
    {id:"ar.minshawi",name:"Al-Minshawi"},
  ];
  const PER_PAGE=20;
  const STORE_KEY="nur-quran-v2";

  const BM_CATS=[
    {id:"none",   label:"Sans catégorie", ico:"🔖", color:"#d4a24e", bg:"rgba(212,162,78,.15)"},
    {id:"revise", label:"À réviser",      ico:"📚", color:"#3498db", bg:"rgba(52,152,219,.15)"},
    {id:"fav",    label:"Favoris",        ico:"⭐", color:"#f1c40f", bg:"rgba(241,196,15,.15)"},
    {id:"med",    label:"Méditation",     ico:"🌙", color:"#9b59b6", bg:"rgba(155,89,182,.15)"},
    {id:"mem2",   label:"À mémoriser",   ico:"🧠", color:"#2ecc71", bg:"rgba(46,204,113,.15)"},
    {id:"imp",    label:"Important",      ico:"🔴", color:"#e74c3c", bg:"rgba(231,76,60,.12)"},
  ];

  // ── State ──
  let S={view:"home",surahs:[],surah:null,surahData:null,mode:"learn",memorized:{},bookmarks:{},bookmarkCats:{},revealed:{},showAr:true,showPh:true,showFr:true,quiz:null,quizShow:false,search:"",filter:"all",bookmarksView:false,bmCatFilter:"all",catModal:null,page:1,loading:false,loadingSurah:false,reciter:RECITERS[0].id,playingAyah:null,audioEl:null,playAll:false,playAllIdx:-1};

  // ── Storage ──
  function load(){try{const d=JSON.parse(localStorage.getItem(STORE_KEY));if(d?.memorized)S.memorized=d.memorized;if(d?.bookmarks)S.bookmarks=d.bookmarks;if(d?.bookmarkCats)S.bookmarkCats=d.bookmarkCats;if(d?.reciter)S.reciter=d.reciter;}catch(e){}}

  // ── API ──
  async function fetchSurahList(){
    S.loading=true;render();
    try{
      const r=await fetch(API+"/surah");const j=await r.json();
      S.surahs=j.data.map(s=>({number:s.number,name:s.englishName,nameAr:s.name,meaning:FR[s.number]||s.englishNameTranslation,ayahCount:s.numberOfAyahs,revelation:s.revelationType==="Meccan"?"Mecquoise":"Médinoise"}));
    }catch(e){console.error(e);}
    S.loading=false;render();
  }

  async function fetchSurahData(num){
    S.loadingSurah=true;S.surahData=null;render();
    try{
      const r=await fetch(`${API}/surah/${num}/editions/quran-uthmani,en.transliteration,fr.hamidullah`);
      const j=await r.json();const[ar,ph,fr]=j.data;
      S.surahData=ar.ayahs.map((a,i)=>({id:a.numberInSurah,ar:a.text,phonetic:ph.ayahs[i].text,fr:fr.ayahs[i].text,globalNum:a.number,juz:a.juz,page:a.page}));
    }catch(e){console.error(e);S.surahData=[];}
    S.loadingSurah=false;render();
  }

  // ── Audio ──
  function stopAudio(){if(S.audioEl){S.audioEl.pause();S.audioEl=null;}S.playingAyah=null;S.playAll=false;S.playAllIdx=-1;}

  async function playOne(surahNum,ayahNum){
    stopAudio();S.playingAyah=surahNum+"-"+ayahNum;render();
    try{
      const r=await fetch(`${API}/ayah/${surahNum}:${ayahNum}/${S.reciter}`);const j=await r.json();
      if(j.data?.audio){
        const a=new Audio(j.data.audio);S.audioEl=a;
        a.onended=()=>{S.playingAyah=null;S.audioEl=null;render();};
        a.onerror=()=>{S.playingAyah=null;S.audioEl=null;render();};
        a.play();
      }
    }catch(e){S.playingAyah=null;render();}
  }

  async function playAllFrom(surahNum,idx){
    if(!S.surahData||idx>=S.surahData.length){stopAudio();render();return;}
    S.playAll=true;S.playAllIdx=idx;
    const v=S.surahData[idx];
    S.playingAyah=surahNum+"-"+v.id;render();
    try{
      const r=await fetch(`${API}/ayah/${surahNum}:${v.id}/${S.reciter}`);const j=await r.json();
      if(j.data?.audio){
        const a=new Audio(j.data.audio);S.audioEl=a;
        a.onended=()=>{if(S.playAll){playAllFrom(surahNum,idx+1);}else{S.playingAyah=null;S.audioEl=null;render();}};
        a.onerror=()=>{S.playingAyah=null;S.audioEl=null;S.playAll=false;render();};
        a.play();
      }
    }catch(e){S.playingAyah=null;S.playAll=false;render();}
  }

  // ── Helpers ──
  function memCount(n){const su=S.surahs.find(x=>x.number===n);if(!su)return 0;let c=0;for(let i=1;i<=su.ayahCount;i++)if(S.memorized[n+"-"+i])c++;return c;}
  function totalMem(){return Object.values(S.memorized).filter(Boolean).length;}
  function totalV(){return S.surahs.reduce((a,s)=>a+s.ayahCount,0);}
  function totalBm(){return Object.keys(S.bookmarks).filter(k=>S.bookmarks[k]).length;}
  function surahHasBm(n){return Object.keys(S.bookmarks).some(k=>S.bookmarks[k]&&k.startsWith(n+"-"));}
  function flt(){
    let l=S.surahs;
    if(S.filter==="meccan")l=l.filter(s=>s.revelation==="Mecquoise");
    else if(S.filter==="medinan")l=l.filter(s=>s.revelation==="Médinoise");
    else if(S.filter==="memorized")l=l.filter(s=>memCount(s.number)>0);
    else if(S.filter==="complete")l=l.filter(s=>memCount(s.number)===s.ayahCount);
    else if(S.filter==="bookmarked")l=l.filter(s=>surahHasBm(s.number));
    if(S.search.trim()){const q=S.search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.meaning.toLowerCase().includes(q)||s.nameAr.includes(q)||String(s.number)===q);}
    return l;
  }

  // ── Render ──
  function render(){
    const root=document.getElementById("app");const isH=S.view==="home"&&!S.bookmarksView;
    let h=`<header class="header"><div class="header-inner">
      <button class="back-btn${isH?' hidden':''}" onclick="${S.bookmarksView?'app.closeBookmarks()':'app.goHome()'}">${I.back}</button>
      <div class="header-title"><div class="bismillah">﷽</div><h1 class="app-title">Nūr al-Qur'ān</h1><p class="app-subtitle">114 Sourates · Arabe · Phonétique · Français · Audio</p></div>
      <div style="width:36px;flex-shrink:0"></div>
    </div></header>`;
    if(S.view==="home"){
      h+=S.bookmarksView?renderBookmarks():renderHome();
    } else {
      h+=renderSurah();
    }
    root.innerHTML=h+renderCatModal();
    const si=document.getElementById("search-in");if(si){si.value=S.search;si.setSelectionRange(S.search.length,S.search.length);}
  }

  function renderHome(){
    if(S.loading)return`<div class="loader"><div class="spinner"></div><div class="loader-text">Chargement des 114 sourates…</div></div>`;
    const tm=totalMem(),tv=totalV(),comp=S.surahs.filter(s=>memCount(s.number)===s.ayahCount).length;
    const pct=tv?Math.round((tm/tv)*100):0;
    const nbm=totalBm();
    const list=flt(),tp=Math.ceil(list.length/PER_PAGE)||1,pg=Math.min(S.page,tp);
    const items=list.slice((pg-1)*PER_PAGE,pg*PER_PAGE);
    let cards=items.map(s=>{
      const mc=memCount(s.number),done=mc===s.ayahCount,p=s.ayahCount?Math.round((mc/s.ayahCount)*100):0;
      const hasBm=surahHasBm(s.number);
      return`<button class="surah-card" onclick="app.openSurah(${s.number})"><div class="surah-num-circle"><span class="surah-num-text">${s.number}</span></div><div class="surah-info"><div class="surah-name-row"><span class="surah-name">${s.name}</span><span class="surah-ar">${s.nameAr}</span></div><span class="surah-meaning">${s.meaning} · ${s.ayahCount} v. · ${s.revelation}${hasBm?' · 🔖':''}</span><div class="surah-meta"><div class="mini-bar"><div class="mini-fill ${done?'green':'gold'}" style="width:${p}%"></div></div><span class="surah-meta-text">${mc}/${s.ayahCount}</span></div></div>${done?'<span class="complete-badge">✓</span>':''}</button>`;
    }).join("")||`<div class="empty">Aucune sourate trouvée.</div>`;

    let pag='';
    if(tp>1){pag=`<div class="pagination"><button class="page-btn" onclick="app.setPage(${pg-1})"${pg<=1?' disabled':''}>‹</button>`;let a=Math.max(1,pg-3),b=Math.min(tp,pg+3);if(a>1)pag+=`<button class="page-btn" onclick="app.setPage(1)">1</button>`;if(a>2)pag+=`<span style="color:var(--text-muted);font-size:.7rem">…</span>`;for(let i=a;i<=b;i++)pag+=`<button class="page-btn${i===pg?' active':''}" onclick="app.setPage(${i})">${i}</button>`;if(b<tp-1)pag+=`<span style="color:var(--text-muted);font-size:.7rem">…</span>`;if(b<tp)pag+=`<button class="page-btn" onclick="app.setPage(${tp})">${tp}</button>`;pag+=`<button class="page-btn" onclick="app.setPage(${pg+1})"${pg>=tp?' disabled':''}>›</button></div>`;}

    return`<div class="content">
      <div class="stats-card"><div class="stats-grid">
        <div class="stat-item"><span class="stat-num">${tm}</span><span class="stat-label">Versets mémorisés</span></div><div class="stat-divider"></div>
        <div class="stat-item"><span class="stat-num">${comp}</span><span class="stat-label">Sourates complètes</span></div><div class="stat-divider"></div>
        <div class="stat-item"><span class="stat-num">${pct}%</span><span class="stat-label">Progression</span></div>
      </div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>

      <button class="bm-panel-btn" onclick="app.openBookmarks()">${I.bkFull} Mes marque-pages<span class="bm-badge">${nbm}</span></button>

      <div class="search-row">
        <input id="search-in" class="search-input" placeholder="Rechercher (nom, numéro, sens)…" oninput="app.onSearch(this.value)" />
        <select class="filter-select" onchange="app.onFilter(this.value)">
          <option value="all"${S.filter==='all'?' selected':''}>Toutes</option>
          <option value="meccan"${S.filter==='meccan'?' selected':''}>Mecquoises</option>
          <option value="medinan"${S.filter==='medinan'?' selected':''}>Médinoises</option>
          <option value="memorized"${S.filter==='memorized'?' selected':''}>En cours</option>
          <option value="complete"${S.filter==='complete'?' selected':''}>Complètes</option>
          <option value="bookmarked"${S.filter==='bookmarked'?' selected':''}>Avec 🔖</option>
        </select>
      </div>
      <h2 class="section-title">${list.length} sourate${list.length>1?'s':''}</h2>
      <div class="surah-list">${cards}</div>${pag}
      ${tm>0?`<button class="reset-btn" onclick="app.reset()">${I.refresh} Réinitialiser la progression</button>`:''}
    </div>`;
  }

  function renderBookmarks(){
    const allEntries=Object.entries(S.bookmarks).filter(([,v])=>v);
    const nbm=allEntries.length;
    const backBtn=`<button class="bm-back-btn" onclick="app.closeBookmarks()">${I.back} Retour aux sourates</button>`;
    if(!nbm){
      return`<div class="content">${backBtn}<div class="bm-empty"><div class="bm-empty-ico">🔖</div><div class="bm-empty-txt">Aucun marque-page pour l'instant.<br><br>Dans une sourate, appuyez sur ${I.bkEmpty} à droite d'un verset pour l'ajouter ici.</div></div></div>`;
    }
    const catCounts={all:nbm};
    BM_CATS.forEach(c=>{catCounts[c.id]=0;});
    allEntries.forEach(([k])=>{const cid=S.bookmarkCats[k]||"none";if(catCounts[cid]!==undefined)catCounts[cid]++;else catCounts["none"]++;});
    const filterRow=`<div class="bm-filter-row">
      <button class="bm-cat-tag${S.bmCatFilter==="all"?" active":""}" style="color:var(--gold);border-color:${S.bmCatFilter==="all"?"var(--gold)":"var(--border)"};background:${S.bmCatFilter==="all"?"var(--gold-dim)":"transparent"}" onclick="app.setBmCatFilter('all')">
        🔖 Tous <span style="opacity:.7">${nbm}</span>
      </button>
      ${BM_CATS.filter(c=>catCounts[c.id]>0).map(c=>`
        <button class="bm-cat-tag${S.bmCatFilter===c.id?" active":""}" style="color:${c.color};border-color:${S.bmCatFilter===c.id?c.color:"var(--border)"};background:${S.bmCatFilter===c.id?c.bg:"transparent"}" onclick="app.setBmCatFilter('${c.id}')">
          ${c.ico} ${c.label} <span style="opacity:.7">${catCounts[c.id]}</span>
        </button>`).join("")}
    </div>`;
    const entries=S.bmCatFilter==="all"?allEntries:allEntries.filter(([k])=>(S.bookmarkCats[k]||"none")===S.bmCatFilter);
    const grouped={};
    entries.forEach(([k])=>{const parts=k.split("-");const sn=parts[0];const vn=parseInt(parts[1]);if(!grouped[sn])grouped[sn]=[];grouped[sn].push(vn);});
    const html=Object.keys(grouped).map(Number).sort((a,b)=>a-b).map(sn=>{
      const su=S.surahs.find(s=>s.number===sn);if(!su)return"";
      const vns=grouped[sn].sort((a,b)=>a-b);
      const cards=vns.map(vn=>{
        const k=sn+"-"+vn;const iP=S.playingAyah===k;
        const cat=BM_CATS.find(c=>c.id===(S.bookmarkCats[k]||"none"))||BM_CATS[0];
        return`<div class="bm-card">
          <div class="bm-card-header">
            <span class="bm-vtag">Sourate ${sn} · Verset ${vn}</span>
            <span style="font-size:.7rem;color:var(--text-muted)">${su.nameAr}</span>
            <span class="bm-cat-pill" style="color:${cat.color};background:${cat.bg}">${cat.ico} ${cat.label}</span>
          </div>
          <div class="bm-card-actions">
            <button class="bm-open" onclick="app.gotoVerse(${sn},${vn})">${I.ext} Ouvrir</button>
            <button class="audio-btn${iP?" playing":""}" onclick="app.playAyah(${sn},${vn})">${iP?I.pause:I.play} ${iP?"Pause":"Écouter"}</button>
            <button class="cat-btn" style="color:${cat.color};border-color:${cat.color}40;background:${cat.bg}" onclick="app.openCatModal(${sn},${vn})">${cat.ico} Catégorie</button>
            <button class="bm-rm" onclick="app.toggleBookmark(${sn},${vn})">${I.trash} Retirer</button>
          </div>
        </div>`;
      }).join("");
      return`<div class="bm-group"><div class="bm-group-title">${su.name} — <span>${su.nameAr}</span> · ${vns.length} marque-page${vns.length>1?"s":""}</div><div class="bm-list">${cards}</div></div>`;
    }).join("");
    return`<div class="content">${backBtn}<h2 class="section-title" style="margin-bottom:12px">${nbm} verset${nbm>1?"s":""} marqué${nbm>1?"s":""}</h2>${filterRow}${html}</div>`;
  }

  function renderCatModal(){
    if(!S.catModal)return"";
    const {sn,vn}=S.catModal;
    const k=sn+"-"+vn;
    const su=S.surahs.find(s=>s.number===sn);
    const currentCat=S.bookmarkCats[k]||"none";
    const choices=BM_CATS.map(c=>`
      <button class="cat-choice${currentCat===c.id?" selected":""}" style="${currentCat===c.id?`border-color:${c.color};background:${c.bg};color:${c.color}`:""}" onclick="app.setCat(${sn},${vn},'${c.id}')">
        <span class="cat-ico">${c.ico}</span>${c.label}

    return`<div class="cat-modal-overlay" onclick="app.closeCatModal()">
      <div class="cat-modal" onclick="event.stopPropagation()">

        <p class="cat-modal-sub">${su?su.name+" — ":""}Verset ${vn}</p>
        <div class="cat-grid">${choices}</div>
        <button class="cat-modal-cancel" onclick="app.closeCatModal()">Annuler</button>
      </div>
    </div>`;

  function renderSurah(){
    const s=S.surah;if(!s)return'';
    const mc=memCount(s.number);
    const tabs=["learn","memorize","quiz"].map(m=>{const l={learn:`${I.book} Apprendre`,memorize:`${I.moon} Mémoriser`,quiz:`${I.star} Quiz`};return`<button class="mode-tab${S.mode===m?' active':''}" onclick="app.setMode('${m}')">${l[m]}</button>`;}).join("");
    const tgl=S.mode!=="quiz"?`<div class="toggle-row">${tb("Arabe",S.showAr,"showAr")} ${tb("Phonétique",S.showPh,"showPh")} ${tb("Français",S.showFr,"showFr")}</div>`:'';
    const rOpts=RECITERS.map(r=>`<option value="${r.id}"${S.reciter===r.id?' selected':''}>${r.name}</option>`).join('');
    const rRow=S.mode!=='quiz'?`<div class="reciter-row"><span class="reciter-label">Récitateur :</span><select class="reciter-select" onchange="app.setReciter(this.value)">${rOpts}</select></div>`:'';

    let body='';
    if(S.loadingSurah)body=`<div class="loader"><div class="spinner"></div><div class="loader-text">Chargement de ${s.name}…</div></div>`;
    else if(!S.surahData)body=`<div class="empty">Erreur de chargement. <button class="primary-btn" style="margin-top:12px" onclick="app.openSurah(${s.number})">${I.refresh} Réessayer</button></div>`;
    else if(S.mode==="learn")body=renderLearn(s);
    else if(S.mode==="memorize")body=renderMem(s);
    else body=renderQuiz(s);

    return`<div class="content">
      <div class="surah-header"><div class="surah-header-ar">${s.nameAr}</div><h2 class="surah-header-name">${s.name}</h2><p class="surah-header-meaning">${s.meaning} · ${s.ayahCount} versets · ${mc} mémorisé${mc>1?'s':''}</p>${rRow}</div>
      <div class="mode-tabs">${tabs}</div>${tgl}${body}
    </div>`;
  }

  function tb(l,a,k){return`<button class="toggle-btn${a?' active':''}" onclick="app.toggle('${k}')">${a?I.eye:I.eyeOff} ${l}</button>`;}

  function vc(v,sn,btn){
    const iM=S.memorized[sn+"-"+v.id],iP=S.playingAyah===sn+"-"+v.id;
    const iB=!!S.bookmarks[sn+"-"+v.id];
    const cat=BM_CATS.find(c=>c.id===(S.bookmarkCats[sn+"-"+v.id]||"none"))||BM_CATS[0];
    return`<div class="verse-card${iM?' memorized':''}${iB?' bookmarked':''}">
      <div class="verse-num">${v.id}</div>
      ${iB?`<div class="bookmark-dot" style="background:${cat.color}" title="${cat.label}"></div>`:''}
      ${S.showAr?`<p class="arabic-text">${v.ar}</p>`:''}
      ${S.showPh?`<p class="phonetic-text">${v.phonetic}</p>`:''}
      ${S.showFr?`<p class="french-text">${v.fr}</p>`:''}
      <div class="verse-actions">
        <button class="audio-btn${iP?' playing':''}" onclick="event.stopPropagation();app.playAyah(${sn},${v.id})">${iP?I.pause:I.play} ${iP?'Pause':'Écouter'}</button>
        ${btn?`<button class="mark-btn${iM?' done':''}" onclick="event.stopPropagation();app.toggleMem(${sn},${v.id})">${iM?I.check+' Mémorisé':I.star+' Mémoriser'}</button>`:''}
        <button class="bk-btn${iB?' on':''}" style="margin-left:auto" onclick="event.stopPropagation();app.toggleBookmark(${sn},${v.id})" title="${iB?'Retirer le marque-page':'Ajouter un marque-page'}">${iB?I.bkFull:I.bkEmpty}</button>
        ${iB?`<button class="cat-btn" style="color:${cat.color};border-color:${cat.color}40;background:${cat.bg}" onclick="event.stopPropagation();app.openCatModal(${sn},${v.id})" title="Changer la catégorie">${cat.ico}</button>`:''}
      </div>
    </div>`;
  }

  function renderLearn(s){
    if(!S.surahData?.length)return'';
    const playAllBtn=`<div class="play-all-row"><button class="play-all-btn${S.playAll?' active':''}" onclick="app.togglePlayAll()">${S.playAll?I.stop+' Arrêter la lecture':I.play+' Écouter toute la sourate'}</button></div>`;
    return`${playAllBtn}<div class="verses-list">${S.surahData.map(v=>vc(v,s.number,true)).join("")}</div>`;
  }

  function renderMem(s){
    if(!S.surahData?.length)return'';
    const cards=S.surahData.map(v=>{
      if(S.revealed[v.id])return`<div class="verse-card" onclick="app.reveal(${v.id})" style="cursor:pointer"><div class="verse-num">${v.id}</div>${S.showAr?`<p class="arabic-text">${v.ar}</p>`:''}${S.showPh?`<p class="phonetic-text">${v.phonetic}</p>`:''}${S.showFr?`<p class="french-text">${v.fr}</p>`:''}</div>`;
      return`<div class="verse-card hidden-verse" onclick="app.reveal(${v.id})"><div class="verse-num">${v.id}</div><div class="tap-reveal">${I.eye} <span>Appuyez pour révéler le verset ${v.id}</span></div></div>`;
    }).join("");
    return`<p class="mode-hint">Essayez de réciter de mémoire, puis appuyez pour révéler chaque verset.</p><div class="verses-list">${cards}</div>`;
  }

  function renderQuiz(s){
    if(!S.surahData?.length)return'';
    const q=S.quiz;
    if(!q)return`<div style="text-align:center;padding:28px"><button class="primary-btn" onclick="app.startQuiz()">Commencer le Quiz</button></div>`;
    if(q.finished){const p=Math.round((q.score/q.questions.length)*100),msg=p>=80?"Excellent ! MāshāAllāh !":p>=50?"Bon effort, continue !":"Révise encore !";return`<div class="quiz-result"><div class="quiz-score-circle"><span class="quiz-score-num">${p}%</span></div><h3 class="quiz-result-title">${msg}</h3><p class="quiz-result-sub">${q.score}/${q.questions.length} bonnes réponses</p><button class="primary-btn" onclick="app.startQuiz()">${I.refresh} Recommencer</button></div>`;}

    const c=q.questions[q.current];
    let pr,ct;
    if(c.type==="ph2ar"){pr="Quel est le texte arabe ?";ct=`<p class="phonetic-text">${c.verse.phonetic}</p><p class="french-text" style="font-size:.78rem;opacity:.7">${c.verse.fr}</p>`;}
    else{pr="Quelle est la phonétique ?";ct=`<p class="french-text" style="font-size:.92rem">${c.verse.fr}</p>`;}

    let aa;
    if(!S.quizShow){aa=`<p class="quiz-hint">Récitez à voix haute, puis révélez.</p><div class="quiz-actions"><button class="primary-btn" onclick="app.quizReveal()">${I.eye} Révéler</button></div>`;}
    else{const an=c.type==="ph2ar"?`<p class="arabic-text">${c.verse.ar}</p>`:`<p class="phonetic-text">${c.verse.phonetic}</p><p class="arabic-text" style="margin-top:8px">${c.verse.ar}</p>`;aa=`<div class="answer-box">${an}</div><p class="quiz-hint">Bonne réponse ?</p><div class="quiz-btn-row"><button class="wrong-btn" onclick="app.quizNext(false)">✗ Non</button><button class="correct-btn" onclick="app.quizNext(true)">✓ Oui</button></div>`;}

    return`<div><div style="margin-bottom:12px"><span style="font-size:.76rem;color:var(--text-dim)">Question ${q.current+1}/${q.questions.length}</span><div class="mini-bar" style="margin-top:6px"><div class="mini-fill gold" style="width:${Math.round((q.current/q.questions.length)*100)}%"></div></div></div><div class="quiz-card"><p class="quiz-label">${pr}</p>${ct}${aa}</div></div>`;
  }

  // ── Public ──
  window.app={
    goHome(){stopAudio();S.view="home";S.surah=null;S.surahData=null;S.mode="learn";S.revealed={};S.quiz=null;render();scrollTo(0,0);},
    async openSurah(n){stopAudio();S.surah=S.surahs.find(s=>s.number===n);S.view="surah";S.mode="learn";S.revealed={};S.quiz=null;render();scrollTo(0,0);await fetchSurahData(n);},
    setMode(m){stopAudio();S.mode=m;S.revealed={};S.quizShow=false;if(m==="quiz"&&!S.quiz)this.startQuiz();else render();},
    toggle(k){S[k]=!S[k];render();},
    toggleMem(sid,vid){const k=sid+"-"+vid;S.memorized[k]=!S.memorized[k];if(!S.memorized[k])delete S.memorized[k];save();render();},
    toggleBookmark(sid,vid){const k=sid+"-"+vid;S.bookmarks[k]=!S.bookmarks[k];if(!S.bookmarks[k]){delete S.bookmarks[k];delete S.bookmarkCats[k];}save();render();},
    openBookmarks(){S.bookmarksView=true;render();scrollTo(0,0);},
    closeBookmarks(){S.bookmarksView=false;render();scrollTo(0,0);},
    setBmCatFilter(catId){S.bmCatFilter=catId;render();},
    openCatModal(sn,vn){S.catModal={sn:Number(sn),vn:Number(vn)};render();},
    closeCatModal(){S.catModal=null;render();},
    setCat(sn,vn,catId){S.bookmarkCats[sn+"-"+vn]=catId;save();S.catModal=null;render();},
    async gotoVerse(sn,vn){stopAudio();S.surah=S.surahs.find(s=>s.number===sn);S.view="surah";S.mode="learn";S.revealed={};S.quiz=null;S.bookmarksView=false;render();scrollTo(0,0);await fetchSurahData(sn);setTimeout(()=>{const els=document.querySelectorAll(".verse-card");if(els[vn-1])els[vn-1].scrollIntoView({behavior:"smooth",block:"center"});},400);},
    reveal(vid){S.revealed[vid]=!S.revealed[vid];render();},
    startQuiz(){if(!S.surahData?.length)return;const vs=[...S.surahData].sort(()=>Math.random()-.5);S.quiz={current:0,score:0,finished:false,questions:vs.map(v=>({verse:v,type:Math.random()>.5?"ph2ar":"fr2ph"}))};S.quizShow=false;S.mode="quiz";render();},
    quizReveal(){S.quizShow=true;render();},
    quizNext(ok){const q=S.quiz;if(ok)q.score++;if(q.current>=q.questions.length-1)q.finished=true;else q.current++;S.quizShow=false;render();},
    onSearch(v){S.search=v;S.page=1;render();},
    onFilter(v){S.filter=v;S.page=1;render();},
    setPage(p){const f=flt();const tp=Math.ceil(f.length/PER_PAGE)||1;S.page=Math.max(1,Math.min(p,tp));render();scrollTo(0,0);},
    reset(){if(confirm("Réinitialiser toute la progression ?")){S.memorized={};save();render();}},
    playAyah(sn,an){if(S.playingAyah===sn+"-"+an){stopAudio();render();return;}S.playAll=false;playOne(sn,an);},
    togglePlayAll(){if(S.playAll){stopAudio();render();}else if(S.surah){playAllFrom(S.surah.number,0);}},
    setReciter(v){stopAudio();S.reciter=v;save();render();},
  };

  load();fetchSurahList();
})();
</script>
</body>
</html>
